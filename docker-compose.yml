version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: todo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_db}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      # جلوگیری از sync کردن cache ها
      - /app/__pycache__
      - /app/*/__pycache__
      - /app/*/*/__pycache__
      - /app/*/*/*/__pycache__
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true
    init: true
    networks:
      - todo_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  todo_network:
    driver: bridge