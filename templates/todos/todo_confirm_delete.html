{% extends 'base.html' %}

{% block title %}حذف کار{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-lg w-full">

        <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">

            <!-- بخش بالایی -->
            <div class="px-8 pt-10 pb-6 text-center">

                <!-- آیکون حذف -->
                <div class="mx-auto h-20 w-20 bg-gradient-to-br from-rose-500 to-red-700 rounded-2xl flex items-center justify-center shadow-lg shadow-rose-500/30 mb-6">
                    <svg class="h-10 w-10 text-white"
                         fill="none"
                         stroke="currentColor"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </div>

                <h1 class="text-3xl font-black text-slate-900">
                    حذف کار
                </h1>

                <p class="mt-4 text-slate-600 font-medium">
                    آیا از حذف این کار مطمئن هستید؟
                </p>

                <!-- اطلاعات کار -->
                <div class="mt-6 p-5 bg-rose-50 border border-rose-200 rounded-2xl">
                    <p class="text-sm text-rose-600 font-semibold mb-2">
                        کاری که حذف خواهد شد:
                    </p>

                    <p class="text-lg font-black text-slate-800">
                        {{ todo.title }}
                    </p>

                    {% if todo.description %}
                        <p class="mt-2 text-sm text-slate-600">
                            {{ todo.description }}
                        </p>
                    {% endif %}
                </div>

                <div class="mt-5 flex items-center justify-center gap-2 text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-xl p-3">
                    <svg class="h-5 w-5 flex-shrink-0"
                         fill="none"
                         stroke="currentColor"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.667 1.73-3L13.73 4c-.77-1.333-2.69-1.333-3.46 0L3.34 16c-.77 1.333.19 3 1.73 3z"/>
                    </svg>

                    این عملیات قابل بازگشت نیست.
                </div>
            </div>

            <!-- دکمه‌ها -->
            <div class="px-8 py-6 bg-slate-50 border-t border-slate-200">

                <form method="POST">
                    {% csrf_token %}

                    <div class="flex flex-col sm:flex-row gap-3">

                        <button type="submit"
                                class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-4 bg-gradient-to-r from-rose-600 to-red-700 hover:from-rose-700 hover:to-red-800 text-white rounded-xl font-black shadow-lg shadow-rose-500/30 hover:shadow-xl transition-all duration-200 transform hover:-translate-y-0.5">

                            <svg class="h-5 w-5"
                                 fill="none"
                                 stroke="currentColor"
                                 viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>

                            بله، حذف شود
                        </button>

                        <a href="{% url 'todos:list' %}"
                           class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-4 bg-white hover:bg-slate-100 text-slate-700 border-2 border-slate-200 rounded-xl font-black transition-all duration-200">

                            <svg class="h-5 w-5"
                                 fill="none"
                                 stroke="currentColor"
                                 viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M6 18L18 6M6 6l12 12"/>
                            </svg>

                            انصراف
                        </a>

                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
